<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scale QA Conformance — Screendragon</title>
<style>
:root {
  /* Sand neutrals */
  --sand-1:  #fdfdfc;
  --sand-2:  #f9f9f8;
  --sand-3:  #f1f0ef;
  --sand-4:  #e9e8e6;
  --sand-5:  #e2e1de;
  --sand-6:  #dad9d6;
  --sand-7:  #cfceca;
  --sand-8:  #bcbbb5;
  --sand-9:  #8d8d86;
  --sand-10: #82827c;
  --sand-11: #63635e;
  --sand-12: #21201c;

  /* Action / brand */
  --teal-9:   #0B6E8A;
  --teal-10:  #005F7B;
  --teal-3:   #D5EFF9;
  --teal-6:   #B0D9E9;

  /* Status */
  --pass-9:  #29A383;
  --pass-3:  #D3F3DD;
  --fail-9:  #E54D2E;
  --fail-3:  #FFDCD7;
  --skip-9:  #8d8d86;
  --skip-3:  #f1f0ef;

  /* Typography */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

  /* Layout */
  --sidebar-w: 280px;
  --header-h: 56px;
  --radius-1: 4px;
  --radius-2: 6px;
  --radius-3: 8px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  color: var(--sand-12);
  background: var(--sand-2);
  -webkit-font-smoothing: antialiased;
}

code, pre, .mono { font-family: var(--font-mono); font-size: 12px; }

/* ============================================================
   LAYOUT
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  height: 100vh;
}

header.app-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--sand-1);
  border-bottom: 1px solid var(--sand-5);
  z-index: 10;
}

.brand {
  display: flex; align-items: center; gap: 12px;
}
.brand-mark {
  width: 24px; height: 24px;
  border-radius: var(--radius-1);
  background: linear-gradient(135deg, var(--teal-9), var(--pass-9));
}
.brand-name {
  font-weight: 600;
  letter-spacing: -0.01em;
}
.brand-name span {
  color: var(--sand-9);
  font-weight: 400;
  margin-left: 6px;
}

.header-actions {
  display: flex; align-items: center; gap: 8px;
}

aside.sidebar {
  background: var(--sand-1);
  border-right: 1px solid var(--sand-5);
  overflow-y: auto;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
}

.sb-section {
  margin-bottom: 24px;
}
.sb-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--sand-9);
  padding: 0 8px;
  margin-bottom: 8px;
}
.review-item {
  padding: 8px 10px;
  border-radius: var(--radius-1);
  cursor: pointer;
  margin-bottom: 2px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.review-item:hover { background: var(--sand-3); }
.review-item.active {
  background: var(--teal-3);
  color: var(--teal-10);
  font-weight: 500;
}
.review-item-name {
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 13px;
}
.review-item-progress {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--sand-9);
}
.review-item.active .review-item-progress { color: var(--teal-10); }

.sb-section-link {
  display: block;
  padding: 6px 8px;
  border-radius: var(--radius-1);
  cursor: pointer;
  font-size: 13px;
  color: var(--sand-11);
  text-decoration: none;
  display: flex; justify-content: space-between; align-items: center;
}
.sb-section-link:hover { background: var(--sand-3); }
.sb-section-link.active {
  background: var(--sand-3);
  color: var(--sand-12);
  font-weight: 500;
}
.sb-count {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--sand-9);
}

main.workspace {
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: var(--radius-1);
  border: 1px solid transparent;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.12s, border-color 0.12s;
  background: transparent;
  color: var(--sand-12);
}
.btn:focus-visible { outline: 2px solid var(--teal-9); outline-offset: 1px; }

.btn-primary { background: var(--teal-9); color: white; }
.btn-primary:hover { background: var(--teal-10); }

.btn-secondary { background: var(--sand-1); border-color: var(--sand-6); }
.btn-secondary:hover { background: var(--sand-3); border-color: var(--sand-7); }

.btn-ghost { background: transparent; color: var(--sand-11); }
.btn-ghost:hover { background: var(--sand-3); color: var(--sand-12); }

.btn-icon {
  width: 28px; height: 28px;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--sand-9);
}
.btn-icon:hover { background: var(--sand-3); color: var(--sand-12); }

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--sand-9);
  padding: 40px;
}
.empty h2 {
  color: var(--sand-12);
  font-weight: 600;
  margin: 0 0 8px;
  font-size: 18px;
}
.empty p { max-width: 420px; margin: 0 0 20px; line-height: 1.6; }

/* ============================================================
   REVIEW HEADER
   ============================================================ */
.review-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 20px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--sand-5);
}
.review-meta { flex: 1; min-width: 0; }
.review-name {
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0 0 6px;
  display: flex; align-items: center; gap: 10px;
}
.review-name input {
  font: inherit; color: inherit;
  border: none; background: transparent;
  padding: 4px 6px; margin: -4px -6px;
  border-radius: var(--radius-1);
  width: 100%;
}
.review-name input:focus {
  outline: none;
  background: var(--sand-3);
}
.review-url {
  color: var(--sand-9);
  font-family: var(--font-mono);
  font-size: 12px;
  margin: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.review-url input {
  font: inherit; color: inherit;
  border: none; background: transparent;
  padding: 3px 6px; margin: -3px -6px;
  border-radius: var(--radius-1);
  width: 100%;
}
.review-url input:focus {
  outline: none;
  background: var(--sand-3);
}

.progress-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.progress-ring {
  width: 56px; height: 56px;
  position: relative;
}
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring-bg { stroke: var(--sand-5); }
.progress-ring-fg { stroke: var(--teal-9); transition: stroke-dashoffset 0.3s; }
.progress-ring-text {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  font-feature-settings: 'tnum';
}

.progress-stats {
  display: flex; flex-direction: column; gap: 2px;
  font-size: 12px;
  font-family: var(--font-mono);
}
.progress-stats span { color: var(--sand-9); }
.progress-stats span b { color: var(--sand-12); margin-right: 4px; font-weight: 600; }
.stat-pass b { color: var(--pass-9); }
.stat-fail b { color: var(--fail-9); }

/* ============================================================
   PAGE TYPE TOGGLES
   ============================================================ */
.page-types {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 28px;
  padding: 12px 14px;
  background: var(--sand-1);
  border: 1px solid var(--sand-5);
  border-radius: var(--radius-2);
}
.page-types-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--sand-9);
  margin-right: 6px;
  align-self: center;
}
.pt-toggle {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--sand-6);
  background: var(--sand-1);
  color: var(--sand-11);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}
.pt-toggle:hover { border-color: var(--sand-8); color: var(--sand-12); }
.pt-toggle.active {
  background: var(--teal-3);
  border-color: var(--teal-9);
  color: var(--teal-10);
  font-weight: 500;
}
.pt-toggle.always-on {
  background: var(--sand-12);
  color: var(--sand-1);
  border-color: var(--sand-12);
  cursor: default;
}

/* ============================================================
   CHECK SECTIONS
   ============================================================ */
.check-section {
  margin-bottom: 32px;
  scroll-margin-top: 80px;
}
.check-section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 4px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--sand-4);
}
.check-section-title {
  font-size: 16px; font-weight: 600;
  letter-spacing: -0.005em;
  margin: 0;
}
.check-section-meta {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--sand-9);
}
.check-section-desc {
  color: var(--sand-11);
  font-size: 13px;
  margin: 6px 0 14px;
  max-width: 720px;
}

/* ============================================================
   CHECK ROW
   ============================================================ */
.check {
  display: grid;
  grid-template-columns: 88px 1fr auto;
  gap: 16px;
  padding: 14px 14px;
  border: 1px solid var(--sand-5);
  border-radius: var(--radius-2);
  background: var(--sand-1);
  margin-bottom: 8px;
  transition: border-color 0.12s, background 0.12s;
}
.check:hover { border-color: var(--sand-7); }
.check.status-pass { background: linear-gradient(to right, var(--pass-3) 0, var(--pass-3) 4px, var(--sand-1) 4px); border-color: var(--sand-5); }
.check.status-fail { background: linear-gradient(to right, var(--fail-3) 0, var(--fail-3) 4px, var(--sand-1) 4px); border-color: var(--sand-5); }
.check.status-na   { background: linear-gradient(to right, var(--skip-3) 0, var(--skip-3) 4px, var(--sand-1) 4px); border-color: var(--sand-5); }

.check-status-group {
  display: flex; flex-direction: column; gap: 4px;
}
.status-btn {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: var(--radius-1);
  border: 1px solid var(--sand-6);
  background: var(--sand-1);
  color: var(--sand-9);
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  letter-spacing: 0.04em;
  transition: all 0.1s;
}
.status-btn:hover { border-color: var(--sand-8); color: var(--sand-12); }
.status-btn[data-active="pass"] { background: var(--pass-9); color: white; border-color: var(--pass-9); }
.status-btn[data-active="fail"] { background: var(--fail-9); color: white; border-color: var(--fail-9); }
.status-btn[data-active="na"]   { background: var(--skip-9); color: white; border-color: var(--skip-9); }

.check-body {
  min-width: 0;
}
.check-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--sand-9);
  margin-right: 8px;
}
.check-title {
  font-size: 14px;
  font-weight: 500;
  margin: 0 0 4px;
}
.check-expected {
  font-size: 13px;
  color: var(--sand-11);
  margin: 0 0 6px;
}
.check-expected code {
  background: var(--sand-3);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 11px;
  color: var(--sand-12);
}
.check-how {
  font-size: 12px;
  color: var(--sand-9);
  margin: 0;
  font-style: italic;
}
.check-how::before { content: "↪ "; font-style: normal; color: var(--sand-8); }

.check-notes {
  margin-top: 10px;
  width: 100%;
  font: inherit;
  font-size: 12px;
  padding: 6px 8px;
  border: 1px solid var(--sand-5);
  border-radius: var(--radius-1);
  resize: vertical;
  min-height: 28px;
  background: var(--sand-1);
  color: var(--sand-12);
  font-family: inherit;
}
.check-notes:focus { outline: 2px solid var(--teal-9); outline-offset: -1px; border-color: var(--teal-9); }
.check-notes:placeholder-shown { min-height: 0; height: 32px; }

.check-aside {
  display: flex; flex-direction: column; gap: 4px;
  align-items: flex-end;
  font-size: 11px;
  color: var(--sand-9);
  font-family: var(--font-mono);
}
.check-token {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 6px;
  background: var(--sand-3);
  border-radius: 3px;
}
.check-swatch {
  width: 12px; height: 12px;
  border-radius: 2px;
  border: 1px solid rgba(0,0,0,0.08);
}

/* ============================================================
   VISUAL AIDS — swatches, compare, example
   ============================================================ */
.visual {
  margin-top: 10px;
  padding: 12px;
  background: var(--sand-2);
  border: 1px solid var(--sand-5);
  border-radius: var(--radius-1);
}
.visual-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--sand-9);
  margin-bottom: 8px;
}

/* Swatches row */
.swatch-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.swatch-card {
  display: flex; flex-direction: column;
  gap: 4px;
  min-width: 96px;
}
.swatch-card .patch {
  width: 100%;
  height: 40px;
  border-radius: var(--radius-1);
  border: 1px solid rgba(0,0,0,0.08);
}
.swatch-card .patch-label {
  font-size: 11px;
  color: var(--sand-12);
  font-weight: 500;
}
.swatch-card .patch-hex {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--sand-9);
}
.swatch-card .patch-note {
  font-size: 10px;
  color: var(--sand-11);
  line-height: 1.4;
}

/* Compare grid (pass vs fail) */
.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.compare-cell {
  background: var(--sand-1);
  border: 1px solid var(--sand-5);
  border-radius: var(--radius-1);
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.compare-cell.pass { border-top: 3px solid var(--pass-9); }
.compare-cell.fail { border-top: 3px solid var(--fail-9); }
.compare-cell::before {
  content: attr(data-tag);
  position: absolute;
  top: 6px; right: 8px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.compare-cell.pass::before { color: var(--pass-9); content: "✓ Pass"; }
.compare-cell.fail::before { color: var(--fail-9); content: "✗ Fail"; }
.compare-render {
  padding: 14px 8px 6px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.compare-note {
  font-size: 11px;
  color: var(--sand-11);
  border-top: 1px solid var(--sand-4);
  padding-top: 6px;
  margin-top: 6px;
  line-height: 1.4;
}

/* Single example (no comparison) */
.example {
  background: var(--sand-1);
  border: 1px solid var(--sand-5);
  border-radius: var(--radius-1);
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60px;
}

/* ============================================================
   DEMO PRIMITIVES — reused inside .visual blocks
   ============================================================
   These exist so check examples can build mini-UIs without
   redefining styles every time. */
.demo-btn {
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius-1);
  border: 1px solid transparent;
  cursor: default;
  display: inline-flex; align-items: center; gap: 6px;
}
.demo-btn.primary { background: var(--teal-9); color: white; }
.demo-btn.secondary { background: var(--sand-1); border-color: var(--sand-6); color: var(--sand-12); }
.demo-btn.ghost { background: transparent; color: var(--sand-11); }
.demo-btn.destructive { background: var(--fail-9); color: white; }
.demo-btn.disabled { opacity: 0.5; background: var(--sand-4); color: var(--sand-9); }
.demo-btn.wrong-secondary { background: var(--teal-9); color: white; } /* used to show "too many primaries" */
.demo-btn.icon { width: 28px; height: 28px; padding: 0; justify-content: center; }
.demo-btn.icon svg { width: 14px; height: 14px; }

.demo-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: var(--font-sans);
  background: var(--sand-1);
}
.demo-table th {
  background: var(--sand-3);
  font-weight: 600;
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--sand-5);
  font-size: 11px;
  color: var(--sand-12);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.demo-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--sand-4);
  color: var(--sand-12);
}
.demo-table tr:last-child td { border-bottom: none; }
.demo-table tr.selected { background: var(--teal-3); }
.demo-table tr.hover { background: var(--sand-2); }
.demo-table .pill {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
}
.demo-table .pill.go { background: var(--pass-3); color: #006a3c; }
.demo-table .pill.draft { background: var(--sand-3); color: var(--sand-11); }
.demo-table .pill.warn { background: #FFE5BE; color: #985B00; }
.demo-table .avatar {
  display: inline-block;
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: 9px; font-weight: 600;
  color: white;
  text-align: center; line-height: 20px;
  margin-right: 6px;
  vertical-align: middle;
}
.demo-table.wrong th { background: var(--sand-1); font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--sand-11); }
.demo-table.wrong tr { background: var(--sand-1); }

/* Wrong-variant for "too heavy" borders */
.demo-table.heavy td { border-bottom: 2px solid var(--sand-12); }

/* Demo inputs */
.demo-input {
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 6px 10px;
  background: var(--sand-1);
  border: 1px solid var(--sand-6);
  border-radius: var(--radius-1);
  color: var(--sand-12);
  width: 200px;
}
.demo-input.focus { outline: 2px solid var(--teal-9); outline-offset: -1px; border-color: var(--teal-9); }
.demo-input.error { border-color: var(--fail-9); }
.demo-input.disabled { background: var(--sand-3); color: var(--sand-9); }
.demo-input.wrong { border-color: #0066ff; outline: 2px solid #0066ff; outline-offset: -1px; } /* browser-default-blue */

.demo-field-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--sand-11);
  margin-bottom: 4px;
}
.demo-helper {
  font-size: 10px;
  color: var(--sand-9);
  margin-top: 4px;
}
.demo-helper.error { color: var(--fail-9); }

/* Demo charts (CSS bars) */
.demo-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 60px;
  padding: 4px;
}
.demo-chart .bar {
  width: 16px;
  border-radius: 2px 2px 0 0;
}

/* Demo modal preview */
.demo-modal {
  background: var(--sand-1);
  border-radius: 8px;
  padding: 12px 14px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  font-size: 11px;
  width: 220px;
}
.demo-modal-footer {
  display: flex; justify-content: flex-end; gap: 6px;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--sand-4);
}

/* Demo focus ring */
.demo-focus {
  display: inline-block;
  padding: 4px 10px;
  background: var(--sand-1);
  border: 1px solid var(--sand-6);
  border-radius: var(--radius-1);
  font-size: 12px;
  outline: 2px solid var(--teal-9);
  outline-offset: 1px;
}

/* Demo nav item */
.demo-nav {
  display: flex; flex-direction: column;
  gap: 2px;
  padding: 8px;
  background: var(--sand-12);
  border-radius: var(--radius-1);
  width: 160px;
}
.demo-nav-item {
  padding: 6px 10px;
  border-radius: 3px;
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.demo-nav-item.active {
  background: rgba(255,255,255,0.1);
  color: white;
  border-left: 2px solid #29A383;
  padding-left: 8px;
}

/* Hex grid for type/spacing demos */
.demo-type {
  display: flex; flex-direction: column;
  gap: 2px;
  font-family: var(--font-sans);
}
.demo-type .h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: var(--sand-12); }
.demo-type .body { font-size: 14px; color: var(--sand-12); }
.demo-type .meta { font-size: 12px; color: var(--sand-11); }
.demo-type .subtle { font-size: 11px; color: var(--sand-9); }

.demo-spacing {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px;
  color: var(--sand-11);
  font-family: var(--font-mono);
}
.demo-spacing .gap {
  background: var(--teal-3);
  border-left: 1px solid var(--teal-9);
  border-right: 1px solid var(--teal-9);
  height: 16px;
}

.demo-radius-row {
  display: flex; gap: 12px; align-items: flex-end;
}
.demo-radius-row .r {
  width: 48px; height: 48px;
  background: var(--sand-12);
  display: flex; align-items: flex-end; justify-content: center;
  color: white; font-size: 9px;
  padding-bottom: 4px;
  font-family: var(--font-mono);
}

/* ============================================================
   MODAL
   ============================================================ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(33, 32, 28, 0.4);
  display: none;
  align-items: center; justify-content: center;
  z-index: 100;
}
.scrim.open { display: flex; }
.modal {
  background: var(--sand-1);
  border-radius: var(--radius-3);
  width: 100%; max-width: 480px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  padding: 24px;
}
.modal h3 { margin: 0 0 16px; font-size: 17px; font-weight: 600; }
.modal label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--sand-11);
  margin: 12px 0 4px;
}
.modal input[type="text"], .modal textarea {
  width: 100%;
  font: inherit;
  padding: 8px 10px;
  border: 1px solid var(--sand-6);
  border-radius: var(--radius-1);
  background: var(--sand-1);
  color: var(--sand-12);
}
.modal input:focus, .modal textarea:focus {
  outline: 2px solid var(--teal-9);
  outline-offset: -1px;
  border-color: var(--teal-9);
}
.modal-actions {
  display: flex; justify-content: flex-end; gap: 8px;
  margin-top: 20px;
}

/* Export modal */
.export-pre {
  background: var(--sand-12);
  color: var(--sand-2);
  padding: 14px;
  border-radius: var(--radius-2);
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.5;
  max-height: 400px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ============================================================
   MISC
   ============================================================ */
.bulk-bar {
  position: sticky;
  top: 0;
  background: var(--sand-2);
  padding: 8px 0;
  margin-bottom: 8px;
  display: flex; gap: 6px;
  z-index: 5;
  border-bottom: 1px solid var(--sand-4);
}

.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--sand-12);
  color: var(--sand-1);
  padding: 10px 16px;
  border-radius: var(--radius-2);
  font-size: 13px;
  z-index: 200;
  animation: toastIn 0.2s ease-out, toastOut 0.2s ease-in 2.3s forwards;
  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } }
@keyframes toastOut { to { opacity: 0; transform: translate(-50%, 8px); } }

.section-jump {
  position: sticky;
  bottom: 16px;
  margin-left: auto;
  background: var(--sand-12);
  color: var(--sand-1);
  padding: 6px 10px;
  border-radius: 16px;
  font-size: 11px;
  font-family: var(--font-mono);
  width: fit-content;
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sand-5); border-radius: 5px; border: 2px solid var(--sand-2); }
::-webkit-scrollbar-thumb:hover { background: var(--sand-7); }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Scale QA<span>Conformance Review</span></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="btn-export" title="Export findings">Export</button>
      <button class="btn btn-ghost" id="btn-import" title="Import a saved review">Import</button>
      <button class="btn btn-primary" id="btn-new-review">+ New review</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Reviews</div>
      <div id="reviews-list"></div>
    </div>
    <div class="sb-section" id="sections-nav-wrap" style="display:none;">
      <div class="sb-label">Jump to section</div>
      <div id="sections-nav"></div>
    </div>
    <div id="storage-indicator" style="margin-top:auto;padding:8px 10px;font-size:10px;color:var(--sand-9);font-family:var(--font-mono);border-top:1px solid var(--sand-5);"></div>
  </aside>

  <main class="workspace" id="workspace">
    <!-- Filled by JS -->
  </main>
</div>

<!-- New review modal -->
<div class="scrim" id="modal-new-review" role="dialog" aria-labelledby="mnr-title" aria-modal="true">
  <div class="modal">
    <h3 id="mnr-title">Start a new review</h3>
    <label for="mnr-name">Page name</label>
    <input type="text" id="mnr-name" placeholder="e.g. Projects list, Asset library, Resource Planner">
    <label for="mnr-url">URL or build reference (optional)</label>
    <input type="text" id="mnr-url" placeholder="https://app.screendragon.com/projects">
    <div class="modal-actions">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="mnr-create">Create review</button>
    </div>
  </div>
</div>

<!-- Export modal -->
<div class="scrim" id="modal-export" role="dialog" aria-labelledby="mex-title" aria-modal="true">
  <div class="modal" style="max-width: 720px;">
    <h3 id="mex-title">Export findings</h3>
    <div style="display:flex; gap:6px; margin-bottom:12px;">
      <button class="btn btn-secondary" data-export-format="markdown">Markdown</button>
      <button class="btn btn-secondary" data-export-format="json">JSON</button>
      <button class="btn btn-secondary" data-export-format="csv">CSV</button>
    </div>
    <pre class="export-pre" id="export-output"></pre>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-copy-export">Copy</button>
      <button class="btn btn-ghost" id="btn-download-export">Download</button>
      <button class="btn btn-secondary" data-modal-close>Close</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="scrim" id="modal-import" role="dialog" aria-labelledby="mim-title" aria-modal="true">
  <div class="modal">
    <h3 id="mim-title">Import review</h3>
    <p style="margin:0 0 10px;color:var(--sand-11);font-size:13px;">Paste a JSON export from another QA session.</p>
    <textarea id="mim-input" rows="8" style="font-family:var(--font-mono);font-size:11px;"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-modal-close>Cancel</button>
      <button class="btn btn-primary" id="btn-do-import">Import</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  STATE
// ============================================================
const CHECKS = JSON.parse(document.getElementById('checks-data').textContent);
let state = {
  reviews: [],          // [{id, name, url, pageTypes:[], statuses:{checkId:{status,notes}}, createdAt, updatedAt}]
  activeReviewId: null
};

// ============================================================
//  STORAGE — window.storage when available (in-conversation),
//  localStorage fallback when hosted standalone (GitHub Pages etc.)
// ============================================================
const STORAGE_PREFIX = 'scale-qa:';

const storage = (() => {
  const hasWindowStorage = typeof window.storage !== 'undefined'
    && typeof window.storage.get === 'function';

  if (hasWindowStorage) {
    return {
      mode: 'window.storage',
      async get(key) {
        try {
          const r = await window.storage.get(key);
          return r ? r.value : null;
        } catch (_) { return null; }
      },
      async set(key, value) {
        await window.storage.set(key, value);
      },
      async delete(key) {
        await window.storage.delete(key);
      }
    };
  }

  // localStorage fallback (used when file is hosted outside the Claude environment)
  return {
    mode: 'localStorage',
    async get(key) {
      try { return localStorage.getItem(STORAGE_PREFIX + key); }
      catch (_) { return null; }
    },
    async set(key, value) {
      try { localStorage.setItem(STORAGE_PREFIX + key, value); }
      catch (e) { console.warn('localStorage set failed:', e); }
    },
    async delete(key) {
      try { localStorage.removeItem(STORAGE_PREFIX + key); }
      catch (_) {}
    }
  };
})();

async function loadState() {
  try {
    const idxRaw = await storage.get('reviews:index');
    if (!idxRaw) return;
    const ids = JSON.parse(idxRaw);
    const reviews = [];
    for (const id of ids) {
      try {
        const r = await storage.get(`review:${id}`);
        if (r) reviews.push(JSON.parse(r));
      } catch (_) {}
    }
    state.reviews = reviews.sort((a,b) => b.updatedAt - a.updatedAt);
    if (state.reviews.length) state.activeReviewId = state.reviews[0].id;
  } catch (e) {
    console.warn('Storage load skipped:', e);
  }
}

async function saveReview(review) {
  review.updatedAt = Date.now();
  try {
    await storage.set(`review:${review.id}`, JSON.stringify(review));
    const ids = state.reviews.map(r => r.id);
    await storage.set('reviews:index', JSON.stringify(ids));
  } catch (e) {
    console.warn('Storage save failed:', e);
  }
}

async function deleteReview(id) {
  state.reviews = state.reviews.filter(r => r.id !== id);
  if (state.activeReviewId === id) {
    state.activeReviewId = state.reviews[0]?.id || null;
  }
  try {
    await storage.delete(`review:${id}`);
    await storage.set('reviews:index', JSON.stringify(state.reviews.map(r => r.id)));
  } catch (e) { console.warn(e); }
}

// ============================================================
//  HELPERS
// ============================================================
function uid() { return 'r_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function getActiveReview() {
  return state.reviews.find(r => r.id === state.activeReviewId);
}

function getActiveSections(review) {
  if (!review) return [];
  return CHECKS.sections.filter(s => s.alwaysOn || review.pageTypes.includes(s.id));
}

function totalChecks(review) {
  return getActiveSections(review).reduce((n, s) => n + s.checks.length, 0);
}

function statusCounts(review) {
  const counts = { pass: 0, fail: 0, na: 0, todo: 0 };
  if (!review) return counts;
  const sections = getActiveSections(review);
  for (const s of sections) {
    for (const c of s.checks) {
      const st = review.statuses[c.id]?.status;
      if (st === 'pass') counts.pass++;
      else if (st === 'fail') counts.fail++;
      else if (st === 'na') counts.na++;
      else counts.todo++;
    }
  }
  return counts;
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ============================================================
//  RENDERING
// ============================================================
function render() {
  renderSidebar();
  renderWorkspace();
}

function renderSidebar() {
  const list = document.getElementById('reviews-list');
  if (!state.reviews.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--sand-9);padding:8px;">No reviews yet. Create one to start.</div>';
    document.getElementById('sections-nav-wrap').style.display = 'none';
    return;
  }
  list.innerHTML = state.reviews.map(r => {
    const counts = statusCounts(r);
    const total = totalChecks(r);
    const done = counts.pass + counts.fail + counts.na;
    return `
      <div class="review-item ${r.id === state.activeReviewId ? 'active' : ''}" data-review-id="${r.id}">
        <span class="review-item-name">${escapeHtml(r.name)}</span>
        <span class="review-item-progress">${done}/${total}</span>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.review-item').forEach(el => {
    el.addEventListener('click', () => {
      state.activeReviewId = el.dataset.reviewId;
      render();
    });
  });

  const review = getActiveReview();
  const navWrap = document.getElementById('sections-nav-wrap');
  const nav = document.getElementById('sections-nav');
  if (review) {
    navWrap.style.display = '';
    const sections = getActiveSections(review);
    nav.innerHTML = sections.map(s => {
      const active = s.checks.filter(c => review.statuses[c.id]?.status).length;
      return `
        <a class="sb-section-link" data-jump="${s.id}">
          <span>${escapeHtml(s.title.split(' — ')[0])}</span>
          <span class="sb-count">${active}/${s.checks.length}</span>
        </a>
      `;
    }).join('');
    nav.querySelectorAll('.sb-section-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById('sec-' + a.dataset.jump)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  } else {
    navWrap.style.display = 'none';
  }
}

function renderWorkspace() {
  const ws = document.getElementById('workspace');
  const review = getActiveReview();
  if (!review) {
    ws.innerHTML = `
      <div class="empty">
        <h2>Start a Scale conformance review</h2>
        <p>Create a review for a product page you want to inspect. Toggle the page-type sections that apply (table, form, chart, etc.) — Global checks always run. Mark each check as Pass, Fail, or N/A. Findings export to Markdown, JSON, or CSV.</p>
        <button class="btn btn-primary" onclick="openModal('modal-new-review')">+ Start a review</button>
      </div>
    `;
    return;
  }
  ws.innerHTML = renderReview(review);
  bindReviewEvents();
}

function renderReview(review) {
  const counts = statusCounts(review);
  const total = totalChecks(review);
  const done = counts.pass + counts.fail + counts.na;
  const pct = total ? Math.round(done / total * 100) : 0;

  const ringRadius = 22;
  const circ = 2 * Math.PI * ringRadius;
  const offset = circ - (pct / 100) * circ;

  const pageTypes = CHECKS.sections.filter(s => !s.alwaysOn);

  const sectionsHtml = getActiveSections(review).map(s => renderSection(review, s)).join('');

  return `
    <div class="review-header">
      <div class="review-meta">
        <h1 class="review-name"><input type="text" id="rh-name" value="${escapeHtml(review.name)}"></h1>
        <p class="review-url"><input type="text" id="rh-url" value="${escapeHtml(review.url || '')}" placeholder="URL or build reference"></p>
      </div>
      <div class="progress-summary">
        <div class="progress-ring">
          <svg width="56" height="56">
            <circle class="progress-ring-bg" cx="28" cy="28" r="${ringRadius}" fill="none" stroke-width="4"></circle>
            <circle class="progress-ring-fg" cx="28" cy="28" r="${ringRadius}" fill="none" stroke-width="4" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"></circle>
          </svg>
          <div class="progress-ring-text">${pct}%</div>
        </div>
        <div class="progress-stats">
          <span class="stat-pass"><b>${counts.pass}</b>pass</span>
          <span class="stat-fail"><b>${counts.fail}</b>fail</span>
          <span><b>${counts.na}</b>n/a</span>
          <span><b>${counts.todo}</b>open</span>
        </div>
      </div>
    </div>

    <div class="page-types">
      <div class="page-types-label">Page types</div>
      <button class="pt-toggle always-on" disabled>Global (always)</button>
      ${pageTypes.map(pt => `
        <button class="pt-toggle ${review.pageTypes.includes(pt.id) ? 'active' : ''}" data-toggle-pt="${pt.id}">
          ${escapeHtml(pt.title.split(' — ')[0])}
        </button>
      `).join('')}
      <button class="btn btn-ghost" style="margin-left:auto;font-size:12px;color:var(--fail-9);" data-delete-review="${review.id}">Delete review</button>
    </div>

    ${sectionsHtml}
  `;
}

function renderSection(review, section) {
  const sectionCounts = section.checks.reduce((acc, c) => {
    const s = review.statuses[c.id]?.status;
    if (s) acc.done++; else acc.todo++;
    return acc;
  }, { done: 0, todo: 0 });

  return `
    <section class="check-section" id="sec-${section.id}">
      <div class="check-section-header">
        <h2 class="check-section-title">${escapeHtml(section.title)}</h2>
        <span class="check-section-meta">${sectionCounts.done}/${section.checks.length} reviewed</span>
      </div>
      ${section.desc ? `<p class="check-section-desc">${escapeHtml(section.desc)}</p>` : ''}
      <div class="bulk-bar">
        <button class="btn btn-ghost" data-bulk="${section.id}" data-status="pass" style="font-size:12px;">Mark all pass</button>
        <button class="btn btn-ghost" data-bulk="${section.id}" data-status="reset" style="font-size:12px;">Reset section</button>
      </div>
      ${section.checks.map(c => renderCheck(review, c)).join('')}
    </section>
  `;
}

function renderCheck(review, check) {
  const result = review.statuses[check.id] || {};
  const status = result.status;
  const notes = result.notes || '';
  const swatch = check.tokenHex
    ? `<span class="check-swatch" style="background:${check.tokenHex};"></span>`
    : '';
  return `
    <div class="check status-${status || 'todo'}" data-check-id="${check.id}">
      <div class="check-status-group">
        <button class="status-btn" data-active="${status === 'pass' ? 'pass' : ''}" data-set-status="${check.id}|pass">Pass</button>
        <button class="status-btn" data-active="${status === 'fail' ? 'fail' : ''}" data-set-status="${check.id}|fail">Fail</button>
        <button class="status-btn" data-active="${status === 'na' ? 'na' : ''}" data-set-status="${check.id}|na">N/A</button>
      </div>
      <div class="check-body">
        <h4 class="check-title"><span class="check-id">${check.id}</span>${escapeHtml(check.title)}</h4>
        <p class="check-expected">${linkifyCode(escapeHtml(check.expected))}</p>
        ${check.how ? `<p class="check-how">${escapeHtml(check.how)}</p>` : ''}
        ${renderVisual(check)}
        <textarea class="check-notes" data-notes="${check.id}" placeholder="Add notes, link to bug ticket, paste screenshot URL…">${escapeHtml(notes)}</textarea>
      </div>
      <div class="check-aside">
        ${check.tokenRef ? `<span class="check-token">${swatch}<span>${escapeHtml(check.tokenRef)}</span></span>` : ''}
        ${check.tokenHex ? `<span class="mono">${check.tokenHex}</span>` : ''}
      </div>
    </div>
  `;
}

function renderVisual(check) {
  const parts = [];
  if (check.swatches) {
    parts.push(`
      <div class="visual">
        <div class="visual-label">Reference colours</div>
        <div class="swatch-row">
          ${check.swatches.map(s => `
            <div class="swatch-card">
              <div class="patch" style="background:${s.hex};"></div>
              <div class="patch-label">${escapeHtml(s.label)}</div>
              <div class="patch-hex">${s.hex}</div>
              ${s.note ? `<div class="patch-note">${escapeHtml(s.note)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `);
  }
  if (check.compare) {
    parts.push(`
      <div class="visual">
        <div class="visual-label">Pass vs Fail</div>
        <div class="compare">
          <div class="compare-cell pass">
            <div class="compare-render">${check.compare.pass}</div>
            ${check.compare.passNote ? `<div class="compare-note">${escapeHtml(check.compare.passNote)}</div>` : ''}
          </div>
          <div class="compare-cell fail">
            <div class="compare-render">${check.compare.fail}</div>
            ${check.compare.failNote ? `<div class="compare-note">${escapeHtml(check.compare.failNote)}</div>` : ''}
          </div>
        </div>
      </div>
    `);
  }
  if (check.example) {
    parts.push(`
      <div class="visual">
        <div class="visual-label">Correct rendering</div>
        <div class="example">${check.example}</div>
      </div>
    `);
  }
  return parts.join('');
}

function bindReviewEvents() {
  // Page type toggles
  document.querySelectorAll('[data-toggle-pt]').forEach(btn => {
    btn.addEventListener('click', () => {
      const review = getActiveReview();
      const pt = btn.dataset.togglePt;
      if (review.pageTypes.includes(pt)) {
        review.pageTypes = review.pageTypes.filter(x => x !== pt);
      } else {
        review.pageTypes.push(pt);
      }
      saveReview(review);
      render();
    });
  });

  // Status buttons
  document.querySelectorAll('[data-set-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [checkId, status] = btn.dataset.setStatus.split('|');
      const review = getActiveReview();
      if (!review.statuses[checkId]) review.statuses[checkId] = { status: null, notes: '' };
      review.statuses[checkId].status = (review.statuses[checkId].status === status) ? null : status;
      saveReview(review);
      render();
    });
  });

  // Notes
  document.querySelectorAll('[data-notes]').forEach(ta => {
    let timer;
    ta.addEventListener('input', () => {
      const checkId = ta.dataset.notes;
      const review = getActiveReview();
      if (!review.statuses[checkId]) review.statuses[checkId] = { status: null, notes: '' };
      review.statuses[checkId].notes = ta.value;
      clearTimeout(timer);
      timer = setTimeout(() => saveReview(review), 400);
    });
  });

  // Bulk
  document.querySelectorAll('[data-bulk]').forEach(btn => {
    btn.addEventListener('click', () => {
      const sectionId = btn.dataset.bulk;
      const status = btn.dataset.status;
      const review = getActiveReview();
      const section = CHECKS.sections.find(s => s.id === sectionId);
      for (const c of section.checks) {
        if (!review.statuses[c.id]) review.statuses[c.id] = { status: null, notes: '' };
        review.statuses[c.id].status = (status === 'reset') ? null : status;
      }
      saveReview(review);
      render();
    });
  });

  // Header inputs
  const nameInput = document.getElementById('rh-name');
  const urlInput = document.getElementById('rh-url');
  if (nameInput) {
    let t1, t2;
    nameInput.addEventListener('input', () => {
      const r = getActiveReview();
      r.name = nameInput.value;
      clearTimeout(t1);
      t1 = setTimeout(() => { saveReview(r); renderSidebar(); }, 400);
    });
    urlInput.addEventListener('input', () => {
      const r = getActiveReview();
      r.url = urlInput.value;
      clearTimeout(t2);
      t2 = setTimeout(() => saveReview(r), 400);
    });
  }

  // Delete
  document.querySelectorAll('[data-delete-review]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this review? This cannot be undone.')) return;
      await deleteReview(btn.dataset.deleteReview);
      render();
    });
  });
}

// ============================================================
//  EXPORT
// ============================================================
function exportReview(format) {
  const review = getActiveReview();
  if (!review) return '';
  const sections = getActiveSections(review);
  const counts = statusCounts(review);
  const total = totalChecks(review);

  if (format === 'json') {
    return JSON.stringify(review, null, 2);
  }
  if (format === 'csv') {
    const rows = [['Section', 'Check ID', 'Title', 'Expected', 'Status', 'Notes']];
    for (const s of sections) {
      for (const c of s.checks) {
        const r = review.statuses[c.id] || {};
        rows.push([
          s.title.split(' — ')[0],
          c.id, c.title, c.expected, r.status || '', (r.notes || '').replace(/\n/g, ' ')
        ]);
      }
    }
    return rows.map(row => row.map(cell =>
      `"${String(cell).replace(/"/g, '""')}"`
    ).join(',')).join('\n');
  }
  // Markdown
  let md = `# Scale QA Conformance — ${review.name}\n\n`;
  if (review.url) md += `**Surface:** ${review.url}\n\n`;
  md += `**Reviewed:** ${new Date(review.updatedAt).toLocaleString()}\n\n`;
  md += `**Coverage:** ${counts.pass + counts.fail + counts.na}/${total} checks (${counts.pass} pass · ${counts.fail} fail · ${counts.na} n/a · ${counts.todo} open)\n\n`;

  // Failures first — that's what gets actioned
  const failures = [];
  for (const s of sections) {
    for (const c of s.checks) {
      const r = review.statuses[c.id];
      if (r?.status === 'fail') failures.push({ section: s.title.split(' — ')[0], check: c, notes: r.notes });
    }
  }
  if (failures.length) {
    md += `## Failures (${failures.length})\n\n`;
    for (const f of failures) {
      md += `### ${f.check.id} — ${f.check.title}\n`;
      md += `*${f.section}*\n\n`;
      md += `**Expected:** ${f.check.expected}\n\n`;
      if (f.check.how) md += `**How:** ${f.check.how}\n\n`;
      if (f.notes) md += `**QA notes:** ${f.notes}\n\n`;
      md += `---\n\n`;
    }
  }

  md += `## Full results\n\n`;
  for (const s of sections) {
    md += `### ${s.title}\n\n`;
    md += `| ID | Check | Status | Notes |\n|---|---|---|---|\n`;
    for (const c of s.checks) {
      const r = review.statuses[c.id] || {};
      const statusGlyph = r.status === 'pass' ? '✅ Pass' : r.status === 'fail' ? '❌ Fail' : r.status === 'na' ? '— N/A' : '· Open';
      const notes = (r.notes || '').replace(/\|/g, '\\|').replace(/\n/g, ' ');
      md += `| ${c.id} | ${c.title} | ${statusGlyph} | ${notes} |\n`;
    }
    md += `\n`;
  }
  return md;
}

function showExport(format) {
  const out = exportReview(format);
  document.getElementById('export-output').textContent = out;
  document.getElementById('modal-export').dataset.format = format;
  openModal('modal-export');
}

// ============================================================
//  MODAL HELPERS
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('open');
  const firstInput = document.querySelector(`#${id} input, #${id} textarea`);
  if (firstInput) setTimeout(() => firstInput.focus(), 50);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('[data-modal-close]').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.scrim').classList.remove('open');
  });
});
document.querySelectorAll('.scrim').forEach(s => {
  s.addEventListener('click', e => {
    if (e.target === s) s.classList.remove('open');
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.scrim.open').forEach(s => s.classList.remove('open'));
  }
});

// ============================================================
//  TOP-LEVEL HANDLERS
// ============================================================
document.getElementById('btn-new-review').addEventListener('click', () => openModal('modal-new-review'));
document.getElementById('btn-export').addEventListener('click', () => {
  if (!getActiveReview()) { toast('Create or select a review first'); return; }
  showExport('markdown');
});
document.getElementById('btn-import').addEventListener('click', () => openModal('modal-import'));

document.getElementById('mnr-create').addEventListener('click', async () => {
  const name = document.getElementById('mnr-name').value.trim();
  const url = document.getElementById('mnr-url').value.trim();
  if (!name) { toast('Page name required'); return; }
  const review = {
    id: uid(), name, url,
    pageTypes: [],
    statuses: {},
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  state.reviews.unshift(review);
  state.activeReviewId = review.id;
  await saveReview(review);
  document.getElementById('mnr-name').value = '';
  document.getElementById('mnr-url').value = '';
  closeModal('modal-new-review');
  render();
});

document.querySelectorAll('[data-export-format]').forEach(btn => {
  btn.addEventListener('click', () => showExport(btn.dataset.exportFormat));
});

document.getElementById('btn-copy-export').addEventListener('click', () => {
  const text = document.getElementById('export-output').textContent;
  navigator.clipboard.writeText(text).then(() => toast('Copied'));
});
document.getElementById('btn-download-export').addEventListener('click', () => {
  const text = document.getElementById('export-output').textContent;
  const fmt = document.getElementById('modal-export').dataset.format || 'markdown';
  const ext = fmt === 'json' ? 'json' : fmt === 'csv' ? 'csv' : 'md';
  const review = getActiveReview();
  const fname = (review.name || 'qa-review').replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '.' + ext;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('btn-do-import').addEventListener('click', async () => {
  const raw = document.getElementById('mim-input').value.trim();
  if (!raw) return;
  try {
    const obj = JSON.parse(raw);
    if (!obj.id || !obj.name || !obj.statuses) throw new Error('Not a valid review');
    obj.id = uid(); // re-assign to avoid collision
    obj.updatedAt = Date.now();
    state.reviews.unshift(obj);
    state.activeReviewId = obj.id;
    await saveReview(obj);
    document.getElementById('mim-input').value = '';
    closeModal('modal-import');
    render();
    toast('Review imported');
  } catch (e) {
    toast('Invalid JSON: ' + e.message);
  }
});

// ============================================================
//  UTIL
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function linkifyCode(html) {
  // wrap sequences that look like tokens or hex codes in <code>
  return html
    .replace(/(--[a-z0-9-]+)/g, '<code>$1</code>')
    .replace(/(#[0-9a-fA-F]{6})/g, '<code>$1</code>');
}

//  BOOT
// ============================================================
(async function() {
  // Show storage mode in sidebar footer
  const ind = document.getElementById('storage-indicator');
  if (ind) {
    if (storage.mode === 'window.storage') {
      ind.textContent = 'Storage: account (persistent)';
    } else {
      ind.innerHTML = 'Storage: browser (persistent)<br><span style="color:var(--sand-8);">Tied to this browser. Export JSON to share.</span>';
    }
  }
  await loadState();
  render();
})();
</script>
