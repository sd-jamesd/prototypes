<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAM editor — Adjust · Template · Access</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
:root{
  --c-primary:#0b6e8a; --c-primary-300:#4db5cf; --cerulean-dark:#7ec7dd;
  --primary-tint-dark:rgba(77,181,207,.16); --surface-hover-dark:rgba(255,255,255,.05);
  --c-amber:#f5a524;
  --ed-bg:#1c1815; --ed-panel:#211c19; --ed-chrome:#161311; --ed-line:rgba(255,255,255,0.08);
  --ed-label:rgba(255,255,255,0.55); --ed-value:rgba(255,255,255,0.92); --ed-faint:rgba(255,255,255,0.4);
  --ed-input-bg:rgba(255,255,255,0.05); --ed-input-bd:rgba(255,255,255,0.40); --ed-error:#ec7a6e;
  --radius-2:4px; --radius-3:6px; --pill:9999px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#0d0b09;color:var(--ed-value);-webkit-font-smoothing:antialiased;
  line-height:1.5;padding:20px;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:var(--font);}

/* ---------- simulator ---------- */
.sim{max-width:1280px;margin:0 auto 14px;background:#17130f;border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-3);padding:12px 14px;display:flex;gap:22px;flex-wrap:wrap;align-items:center;}
.sim-g{display:flex;gap:9px;align-items:center;}
.sim-l{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ed-faint);}
.seg{display:flex;background:rgba(255,255,255,.05);border:1px solid var(--ed-line);border-radius:var(--radius-2);padding:2px;}
.seg button{font-size:12px;font-weight:600;color:var(--ed-label);padding:4px 10px;border-radius:3px;white-space:nowrap;}
.seg button.on{background:var(--primary-tint-dark);color:var(--cerulean-dark);}
.sw{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ed-label);}
.sw .tk{width:32px;height:18px;border-radius:var(--pill);background:rgba(255,255,255,.16);position:relative;transition:.15s;}
.sw .tk::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.15s;}
.sw.on .tk{background:var(--c-primary);}
.sw.on .tk::after{transform:translateX(14px);}
.sim .rst{margin-left:auto;font-size:12px;font-weight:600;color:var(--cerulean-dark);
  border:1px solid var(--cerulean-dark);border-radius:var(--radius-2);padding:5px 12px;}

/* ---------- app shell ---------- */
.app{max-width:1280px;margin:0 auto;background:var(--ed-panel);border:1px solid var(--ed-line);
  border-radius:8px;overflow:hidden;box-shadow:0 20px 50px -20px rgba(0,0,0,.8);}
.top{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--ed-chrome);
  border-bottom:1px solid var(--ed-line);}
.top .ic{color:var(--cerulean-dark);display:flex;}
.top .ed{font-size:14px;font-weight:700;}
.top .dot{color:var(--ed-faint);}
.top .fn{font-size:14px;color:var(--ed-label);}
.top .ta{margin-left:auto;display:flex;gap:8px;}
.body{display:flex;height:660px;}

/* rail */
.rail{width:88px;flex:none;background:#26211f;border-right:1px solid var(--ed-line);
  display:flex;flex-direction:column;gap:2px;padding:8px 0;overflow-y:auto;}
.ri{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;
  color:rgba(255,255,255,.62);font-size:12px;font-weight:500;text-align:center;width:100%;}
.ri svg{width:20px;height:20px;stroke-linecap:round;stroke-linejoin:round;}
.ri:hover{background:var(--surface-hover-dark);color:rgba(255,255,255,.88);}
.ri.on{color:var(--cerulean-dark);background:var(--primary-tint-dark);}
.ri.on::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--cerulean-dark);border-radius:0 2px 2px 0;}
.ri.inert{opacity:.42;cursor:default;}
.ri.inert:hover{background:none;color:rgba(255,255,255,.62);}
.rail-div{height:1px;background:rgba(255,255,255,.09);margin:7px 15px;flex:none;}

/* panel */
.panel{width:330px;flex:none;padding:18px 16px;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent;}
.panel::-webkit-scrollbar{width:8px;height:0;}
.panel::-webkit-scrollbar-track{background:transparent;}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:var(--pill);
  border:2px solid transparent;background-clip:padding-box;}
.panel::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.26);background-clip:padding-box;}
.rail{scrollbar-width:none;} .rail::-webkit-scrollbar{display:none;}
.ph{font-size:16px;font-weight:600;margin-bottom:16px;flex:none;}
.sec{margin-bottom:18px;}
.sh{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;padding-bottom:10px;}
.sh > svg{width:16px;height:16px;color:var(--ed-faint);flex:none;}
.sh .count{font-size:11px;font-weight:600;color:var(--c-primary-300);}
.sh .act{margin-left:auto;}
.sh.coll{cursor:pointer;border-bottom:1px solid var(--ed-line);}
.tri{margin-left:auto;color:var(--ed-faint);display:inline-flex;}
.tri svg{width:8px;height:8px;transition:transform .12s;}
.tri.closed svg{transform:rotate(-90deg);}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ed-faint);margin:15px 0 8px;}

/* fields */
.field{margin-bottom:12px;min-width:0;}
.inp{max-width:100%;}
input[type=date].inp{min-width:0;}
.flab{font-size:12px;color:var(--ed-label);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.opt{font-size:11px;font-weight:700;color:var(--ed-faint);border:1px solid var(--ed-faint);padding:0 5px;border-radius:3px;}
.inp{width:100%;background:var(--ed-input-bg);border:1px solid var(--ed-input-bd);border-radius:var(--radius-2);
  color:var(--ed-value);font-size:14px;padding:8px 11px;outline:none;}
.inp:focus{border-color:var(--cerulean-dark);}
.inp::placeholder{color:rgba(255,255,255,.32);}
select.inp{appearance:none;cursor:pointer;}
.help{font-size:11px;color:var(--ed-faint);margin-top:5px;line-height:16px;}
.ro{display:grid;grid-template-columns:100px 1fr;gap:10px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--ed-line);}
.ro:last-of-type{border-bottom:none;}
.ro{min-width:0;} .ro .k{color:var(--ed-label);} .ro .v{color:var(--ed-value);font-weight:500;min-width:0;overflow-wrap:anywhere;}
.lockrow{display:flex;gap:8px;align-items:center;}
.lockrow .inp{flex:1;min-width:0;}
.lockbtn{width:34px;height:36px;flex:none;border:1px solid var(--ed-input-bd);border-radius:var(--radius-2);
  display:flex;align-items:center;justify-content:center;color:var(--cerulean-dark);background:var(--primary-tint-dark);}
.lockbtn svg{width:14px;height:14px;}
.rot{display:flex;gap:8px;align-items:center;}
.rbtn{width:34px;height:34px;border:1px solid var(--ed-input-bd);border-radius:var(--radius-2);
  display:flex;align-items:center;justify-content:center;}
.rbtn svg{width:15px;height:15px;}

/* date control */
.datewrap{display:flex;gap:8px;align-items:center;}
.datewrap .inp{flex:1;min-width:0;}
input[type=date].inp{cursor:pointer;color-scheme:dark;}
input[type=date].inp:invalid{border-color:var(--ed-error);}
.eff{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;margin-top:7px;
  padding:6px 9px;border-radius:3px;}
.eff.set{color:#e0b060;background:rgba(245,165,36,.12);border:1px solid rgba(245,165,36,.28);}
.eff.none{color:var(--ed-faint);background:rgba(255,255,255,.03);border:1px solid var(--ed-line);}
.eff.bad{color:var(--ed-error);background:rgba(236,122,110,.10);border:1px solid rgba(236,122,110,.32);}
.eff svg{width:12px;height:12px;flex:none;}

/* buttons */
.btn{font-size:14px;font-weight:600;height:34px;padding:0 13px;border-radius:var(--radius-2);
  display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;}
.btn svg{width:14px;height:14px;flex:none;}
.btn-pri{background:var(--c-primary);color:#fff;}
.btn-pri:hover{background:#095c74;}
.btn-sec{background:transparent;color:var(--cerulean-dark);border-color:var(--cerulean-dark);}
.btn-sec:hover{background:var(--primary-tint-dark);}
.btn-ter{background:transparent;color:var(--cerulean-dark);}
.btn-ter:hover{background:var(--surface-hover-dark);}
.btn-gho{background:transparent;color:var(--ed-faint);height:28px;padding:0 6px;}
.btn-gho:hover{background:var(--surface-hover-dark);color:var(--ed-value);}
.btn-dst{background:transparent;color:var(--ed-error);border-color:var(--ed-error);}
.btn-full{width:100%;}
.btn[disabled]{opacity:.4;cursor:not-allowed;}
.btn-sm{height:28px;font-size:12px;padding:0 9px;}
.acts{margin-top:auto;padding-top:16px;display:flex;flex-direction:column;gap:8px;flex:none;}

/* list rows (Access) */
.lr{display:flex;align-items:center;gap:10px;border:1px solid var(--ed-line);padding:10px 11px;}
.lr:first-of-type{border-radius:var(--radius-3) var(--radius-3) 0 0;}
.lr:last-of-type{border-radius:0 0 var(--radius-3) var(--radius-3);}
.lr + .lr{margin-top:-1px;}
.lr.dis{opacity:.55;}
.lr-m{flex:1;min-width:0;}
.lr-t{font-size:14px;font-weight:500;}
.lr-s{font-size:12px;color:var(--ed-label);margin-top:2px;}
.lr-u{font-size:12px;color:var(--ed-faint);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lr-a{display:flex;gap:2px;flex:none;position:relative;}
.why{font-size:11px;font-weight:500;color:var(--ed-error);margin-top:4px;display:flex;align-items:center;gap:5px;}
.why svg{width:11px;height:11px;flex:none;}
.gen{font-size:11px;font-weight:500;color:var(--cerulean-dark);margin-top:4px;display:flex;align-items:center;gap:5px;}
.gen svg{width:11px;height:11px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.none{font-size:12px;color:var(--ed-faint);font-style:italic;margin-top:4px;}
.skel{display:inline-block;height:9px;width:42px;border-radius:2px;vertical-align:-1px;
  background:linear-gradient(90deg,rgba(255,255,255,.07) 25%,rgba(255,255,255,.17) 37%,rgba(255,255,255,.07) 63%);
  background-size:400% 100%;animation:sh 1.3s ease infinite;}
@keyframes sh{0%{background-position:100% 50%}100%{background-position:0 50%}}

/* selectable list (Template) */
.li{display:flex;gap:10px;align-items:center;padding:9px 8px;border-bottom:1px solid var(--ed-line);
  border-left:2px solid transparent;cursor:pointer;}
.li:hover{background:var(--surface-hover-dark);}
.li.on{background:var(--primary-tint-dark);border-left-color:var(--cerulean-dark);}
.li.dis{opacity:.55;cursor:default;}
.li.dis:hover{background:none;}
.cbx{width:15px;height:15px;border-radius:3px;border:1.5px solid rgba(255,255,255,.4);flex:none;
  display:flex;align-items:center;justify-content:center;}
.cbx.on{background:var(--c-primary);border-color:var(--c-primary);}
.cbx.on svg{width:9px;height:9px;color:#fff;}
.cbx.no{border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.03);}
.thumb{border-radius:2px;flex:none;background:linear-gradient(135deg,#4a6f82 0%,#8fa6a0 45%,#c9a06a 100%);}
.li-m{flex:1;min-width:0;}
.li-t{font-size:14px;font-weight:600;}
.li-s{font-size:12px;color:var(--ed-label);margin-top:1px;}
.chan{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--cerulean-dark);
  background:var(--primary-tint-dark);border-radius:var(--pill);padding:1px 7px;flex:none;}
.chan svg{width:10px;height:10px;}
.grp{display:flex;align-items:center;gap:8px;padding:9px 8px;font-size:12px;font-weight:600;color:var(--ed-label);
  border-top:1px solid var(--ed-line);cursor:pointer;}
.grp:hover{background:var(--surface-hover-dark);}
.grp .n{margin-left:auto;font-size:11px;color:var(--ed-faint);font-weight:500;}

/* channel chips — .chip was never defined; the toggles were rendering as plain text */
.chips{display:flex;gap:9px;flex-wrap:wrap;min-width:0;}
.chip{font-size:12px;font-weight:500;color:var(--ed-label);border:1px solid var(--ed-input-bd);
  border-radius:var(--pill);padding:4px 11px;background:transparent;white-space:nowrap;}
.chip:hover:not([disabled]){border-color:var(--cerulean-dark);color:var(--ed-value);}
.chip.on{background:var(--primary-tint-dark);border-color:var(--cerulean-dark);color:var(--cerulean-dark);}
.chip[disabled]{opacity:.45;cursor:not-allowed;}

/* alerts */
.alert{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border-radius:var(--radius-3);margin-bottom:12px;}
.alert svg{width:15px;height:15px;flex:none;margin-top:1px;}
.alert .at{font-size:12px;color:var(--ed-label);line-height:17px;}
.alert .at b{display:block;color:var(--ed-value);font-weight:600;margin-bottom:2px;}
.a-open{border:1px solid rgba(245,165,36,.35);background:rgba(245,165,36,.10);}
.a-open svg{color:var(--c-amber);}
.a-info{border:1px dashed var(--ed-line);background:rgba(255,255,255,.02);}
.a-info svg{color:var(--ed-faint);}
.a-err{border:1px solid rgba(236,122,110,.35);background:rgba(236,122,110,.10);}
.a-err svg{color:var(--ed-error);}
.empty{text-align:center;padding:24px 8px;color:var(--ed-label);}
.empty svg{width:26px;height:26px;color:var(--ed-faint);margin-bottom:10px;}
.empty .e1{font-size:14px;} .empty .e2{margin-top:14px;}
.audit{font-size:11px;color:var(--ed-faint);padding-top:12px;margin-top:10px;border-top:1px solid var(--ed-line);line-height:16px;}

/* stage */
.stage{flex:1;background:var(--ed-bg);border-left:1px solid var(--ed-line);padding:16px;
  display:flex;flex-direction:column;gap:12px;min-width:0;overflow:hidden;}
.acc{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--ed-faint);flex:none;}
.acc svg{width:13px;height:13px;flex:none;} .acc b{color:var(--ed-label);font-weight:600;}
.canvas{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;}
.crop{position:relative;background:linear-gradient(135deg,#4a6f82 0%,#8fa6a0 45%,#c9a06a 100%);
  outline:1px solid rgba(255,255,255,.85);border-radius:2px;transition:width .18s,height .18s;}
.crop::before,.crop::after{content:'';position:absolute;inset:0;pointer-events:none;}
.crop::before{border-left:1px solid rgba(255,255,255,.26);border-right:1px solid rgba(255,255,255,.26);margin:0 33.3%;}
.crop::after{border-top:1px solid rgba(255,255,255,.26);border-bottom:1px solid rgba(255,255,255,.26);margin:33.3% 0;}
.hnd{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;}
.hnd.a{top:-4px;left:-4px}.hnd.b{top:-4px;right:-4px}.hnd.c{bottom:-4px;left:-4px}.hnd.d{bottom:-4px;right:-4px}
.focal{position:absolute;width:20px;height:20px;border-radius:50%;border:2px solid var(--c-amber);
  top:42%;left:57%;box-shadow:0 0 0 3px rgba(0,0,0,.35);}
.focal::after{content:'';position:absolute;inset:6px;border-radius:50%;background:var(--c-amber);}
.outs{border-top:1px solid var(--ed-line);padding-top:12px;flex:none;}
.outs-h{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;margin-bottom:10px;}
.outs-h > svg{width:16px;height:16px;color:var(--ed-faint);}
.outs-h .count{font-size:11px;font-weight:600;color:var(--c-primary-300);}
.outs-h .act{margin-left:auto;}
.chips{display:flex;gap:9px;flex-wrap:wrap;}
.oc{display:flex;gap:9px;align-items:center;padding:7px 10px;border:1px solid var(--ed-line);border-radius:var(--radius-3);min-width:180px;}
.oc.eph{border-style:dashed;border-color:var(--cerulean-dark);background:var(--primary-tint-dark);}
.oc.add{border-style:dashed;color:var(--cerulean-dark);font-size:12px;font-weight:600;justify-content:center;cursor:pointer;}
.oc.add:hover{background:var(--primary-tint-dark);}
.oc-t{font-size:12px;font-weight:600;} .oc-s{font-size:11px;color:var(--ed-label);margin-top:1px;}
.eph-x{margin-left:auto;color:var(--ed-faint);font-size:14px;padding:0 2px;}

/* menus */
.menu{position:absolute;right:0;top:calc(100% + 4px);z-index:60;min-width:224px;padding:4px;
  background:#2a2422;border:1px solid var(--ed-input-bd);border-radius:var(--radius-3);
  box-shadow:0 14px 32px -8px rgba(0,0,0,.75);}
.menu.up{top:auto;bottom:calc(100% + 4px);}
.mi{display:flex;align-items:center;gap:9px;width:100%;padding:7px 8px;font-size:12px;color:var(--ed-label);
  border-radius:var(--radius-2);text-align:left;}
.mi svg{width:14px;height:14px;flex:none;color:var(--ed-faint);}
.mi:hover{background:var(--surface-hover-dark);color:var(--ed-value);}
.mi.dst{color:var(--ed-error);} .mi.dst svg{color:var(--ed-error);}
.mi .tag{margin-left:auto;font-size:11px;font-weight:600;color:var(--ed-faint);display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.mi .tag svg{width:10px;height:10px;}
.msep{height:1px;background:var(--ed-line);margin:4px 0;}
.mcap{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ed-faint);padding:6px 8px 4px;}

/* modal */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.mdl{width:460px;max-height:88vh;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent;background:var(--ed-panel);border:1px solid var(--ed-line);
  border-radius:8px;padding:20px;box-shadow:0 26px 60px -14px rgba(0,0,0,.8);}
.mdl .mt{font-size:16px;font-weight:600;margin-bottom:6px;}
.mdl .mb{font-size:14px;color:var(--ed-label);margin-bottom:14px;}
.mdl .mf{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--ed-line);}
.pv{display:flex;gap:12px;align-items:center;padding:11px;background:var(--ed-chrome);border:1px solid var(--ed-line);
  border-radius:var(--radius-2);margin-bottom:14px;}
.pv .px{width:60px;height:60px;border-radius:2px;flex:none;background:linear-gradient(135deg,#4a6f82,#8fa6a0 45%,#c9a06a);}
.pv .pt{font-size:12px;font-weight:600;} .pv .ps{font-size:11px;color:var(--ed-label);margin-top:3px;line-height:16px;}
.scope{flex:1;display:flex;gap:8px;align-items:flex-start;padding:9px 10px;border:1px solid var(--ed-input-bd);
  border-radius:var(--radius-2);cursor:pointer;}
.scope.on{border-color:var(--cerulean-dark);background:var(--primary-tint-dark);}
.scope.no{opacity:.42;cursor:not-allowed;}
.scope .dt{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--ed-faint);flex:none;margin-top:2px;}
.scope.on .dt{border-color:var(--cerulean-dark);border-width:4px;}
.scope b{display:block;font-size:12px;font-weight:500;} .scope em{display:block;font-size:11px;font-style:normal;color:var(--ed-faint);margin-top:1px;}
.dupe{display:flex;gap:9px;padding:11px;border:1px solid rgba(245,165,36,.32);background:rgba(245,165,36,.10);
  border-radius:var(--radius-2);margin-top:12px;}
.dupe svg{width:15px;height:15px;color:var(--c-amber);flex:none;margin-top:1px;}
.dupe .dt2{font-size:12px;color:var(--ed-label);line-height:17px;}
.dupe .dt2 b{display:block;color:var(--ed-value);font-weight:600;margin-bottom:2px;}

/* ============================================================
   ORG MANAGER — light surface (the theme the contract uses for
   library, filters, lightbox and collections)
   ============================================================ */
.appnav{max-width:1280px;margin:0 auto 14px;display:flex;gap:2px;align-items:center;
  background:#17130f;border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-3);padding:6px;}
.appnav .brand{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ed-faint);padding:0 12px 0 8px;}

};
const svg=(d,w=16,sw=2)=>`<svg viewBox="0 0 24 24" width="${w}" height="${w}" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
const tri = open => `<span class="tri ${open?'':'closed'}"><svg viewBox="0 0 10 10"><path d="M1 2.5l4 5 4-5z" fill="currentColor"/></svg></span>`;
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));


/* ---------- dates: rights is the ceiling, auto-revoke can only shorten ---------- */
const todayISO = ()=> TODAY;
const ceilingISO = ()=> S.rights.expiry || null;
function fmtDate(iso){ if(!iso) return '—';
  const [y,m,d]=iso.split('-'); const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${+d} ${M[+m-1]} ${y}`; }
function setRevoke(v){
  const c = ceilingISO();
  if(v && c && v > c){ toast(`Rights expire ${fmtDate(c)} — links can't outlive them`); S.autoRevoke = c; }
  else S.autoRevoke = v;
  draw();
}
/* the value that actually governs = min(rights ceiling, auto-revoke) */
function effectiveLine(){
  const c = ceilingISO(), a = S.autoRevoke;
  if(!c && !a) return `<div class="eff none">${svg(I.info,12)}These links work forever.</div>`;
  const eff = (c && a) ? (a < c ? a : c) : (a || c);
  const src = (c && a) ? (a < c ? 'the link expiry' : 'the rights expiry') : (a ? 'the link expiry' : 'the rights expiry');
  return `<div class="eff set">${svg(I.clock,12)}Links stop working <b style="font-weight:700;">${fmtDate(eff)}</b> — set by ${src}.</div>`;
}
function checkEph(){
  const w=+cw.value, h=+ch.value, box=document.getElementById('ephChk');
  if(!box) return;
  const tooBig = w>SOURCE.w || h>SOURCE.h;
  box.className = 'eff ' + (tooBig?'bad':'none');
  box.innerHTML = tooBig
    ? svg(I.no,12)+`Larger than the source (${SOURCE.w} × ${SOURCE.h}). No upscaling.`
    : svg(I.info,12)+`Source is ${SOURCE.w} × ${SOURCE.h}. Outputs are capped at the source — no upscaling.`;
}

      <div class="eyebrow">Delivery</div>

      <div class="field" style="margin-top:12px;">

            ${isMgr()?'':'disabled'} onchange="setRevoke(this.value)">

  }

  panel.innerHTML = `<div class="ph">Access</div>${peopleSec}
    <div class="sec">

  if(kind==='idle') return `<div class="menu up"><button class="mi" onclick="publishOne('${t.slug}')">${svg(I.link,14)}Create a link for this output<span class="tag">confirm</span></button></div>`;
  return `<div class="menu up">
    <button class="mi" onclick="toast('Opens ${url(t)}')">${svg(I.ext,14)}Open in new tab</button>

    ${isMgr()?`<div class="msep"></div><div class="mcap">Manager</div>
      <button class="mi" onclick="retry('${t.slug}')">${svg(I.refresh,14)}Create this output again</button>
      <button class="mi" onclick="toast('Cached copies refreshed')">${svg(I.refresh,14)}Refresh cached copies</button>
      <button class="mi dst" onclick="revokeOne('${t.slug}')">${svg(I.no,14)}Remove this link<span class="tag">confirm</span></button>`:''}

/* ============================================================
   ACTIONS
   ============================================================ */
function beginRender(slugs){
  slugs.forEach((s,i)=>{
    S.outputs[s] = {status:'preparing'};
    setTimeout(()=>{
      const fail = S.simFail && s==='email-banner';
      S.outputs[s] = {status: fail?'failed':'ready'};
      draw();
    }, 900 + i*700);
  });
  draw();
}
function retry(slug){ S.outputs[slug]={status:'preparing'}; draw();
  setTimeout(()=>{ S.outputs[slug]={status:'ready'}; draw(); toast('Output created again and checked'); },1100); }
function publishOne(slug){
  S.menu=null;
  const t = S.templates.find(x=>x.slug===slug);
  modal(`
    <div class="mt">Create a link for ${esc(t.name)}?</div>
    <div class="mb">This output becomes downloadable by anyone with the address, without signing in.</div>
    <div class="ro"><span class="k">Output</span><span class="v">${t.w} × ${t.h} · ${t.fmt}</span></div>
    <div class="ro"><span class="k">Address</span><span class="v" style="word-break:break-all;">${url(t)}</span></div>
    <div class="ro"><span class="k">Stops working</span><span class="v">${ceilingISO()?fmtDate(ceilingISO())+' — when the rights expire':'Never — the licence has no end date'}</span></div>
    <div class="mf"><button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pri" onclick="closeModal();beginRender(['${slug}']);toast('Link created');">Create link</button></div>`);
}
function revokeOne(slug){
  S.menu=null;
  const t = S.templates.find(x=>x.slug===slug);
  const n = REQUESTS[slug] || 0;
  const used = n > 0;
  modal(`
    <div class="mt">Remove the ${esc(t.name)} link?</div>
    <div class="mb">${used
      ? `This link has been loaded <b style="color:var(--ed-value);font-weight:600;">${n.toLocaleString()} times in the last 30 days</b>. Something is using it — a partner site, an email, a CMS — and that something will show a broken image.`
      : `This link has <b style="color:var(--ed-value);font-weight:600;">never been loaded</b>. Nothing is using it, so nothing will break.`}</div>
    <div class="ro"><span class="k">Address</span><span class="v" style="word-break:break-all;">${url(t)}</span></div>
    <div class="ro"><span class="k">Loads · 30d</span><span class="v">${used?n.toLocaleString():'None'}</span></div>
    <div class="ro"><span class="k">Other outputs</span><span class="v">Unaffected — they keep working</span></div>
    <div class="alert ${used?'a-open':'a-info'}" style="margin-top:14px;">${svg(used?I.warn:I.info,15)}<div class="at">
      <b>You can put this link back</b>The address is generated from the asset and the output, so recreating it gives the identical address. Anything embedded starts working again. Until then, it is broken.</div></div>
    ${used?`<div class="field" style="margin-top:14px;">
      <div class="flab">Reason</div><input class="inp" placeholder="Recorded in the audit log"></div>`:''}
    <div class="mf">
      <button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn ${used?'btn-dst':'btn-pri'}" onclick="doRemoveLink('${slug}')">Remove link</button>
    </div>`);
}
function doRemoveLink(slug){ delete S.outputs[slug]; closeModal(); toast('Link removed · cached copies cleared'); }

function openPublish(){
  const G = gate(), elig = eligible();
  const dlOnly = S.templates.filter(t=>t.channel==='download' && t.scope==='shared').map(t=>t.name);
  modal(`
    <div class="mt">Create public links?</div>
    <div class="mb">${elig.length} outputs of <b style="color:var(--ed-value);font-weight:600;">${SOURCE.name}</b> will be available on the open web. Anyone with a link can download them without signing in.</div>
    <div class="ro"><span class="k">Outputs</span><span class="v">${elig.map(t=>esc(t.name)).join(', ')}</span></div>
    <div class="ro"><span class="k">Not included</span><span class="v">${dlOnly.join(', ')} — download-only templates, set in Org Manager. Not a rights decision.</span></div>
    <div class="ro"><span class="k">Rights expiry</span><span class="v">${G.ceiling?fmtDate(G.ceiling)+' — links stop working on this date':'None — the licence has no end date'}</span></div>
    <div class="field" style="margin-top:14px;">
      <div class="flab">Link expiry <span class="opt">OPTIONAL</span></div>
      <input type="date" class="inp" id="pubArv" min="${todayISO()}" ${ceilingISO()?`max="${ceilingISO()}"`:''}>
      <div class="help">${ceilingISO()

        : `Leave empty and the links work forever. The licence has no end date.`}</div>
    </div>
    <div class="alert a-info" style="margin-top:12px;">${svg(I.info,15)}<div class="at">Creating links is instant. <b style="display:inline;">Removing</b> them is the slow part — every cached copy has to be cleared from every region.</div></div>
    <div class="mf">
      <button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pri" onclick="doPublish()">Create ${elig.length} link${elig.length===1?'':'s'}</button>

}
function setRevokeSilent(v){ const c=ceilingISO(); S.autoRevoke = (v && c && v>c) ? c : v; }
function doPublish(){
  const arv = document.getElementById('pubArv'); if(arv && arv.value) setRevokeSilent(arv.value);
  S.published = true; closeModal();
  beginRender(eligible().map(t=>t.slug));
  toast('Public links created · preparing outputs');
}
function openRestore(){
  const G = gate();
  const back = S.revoked.map(sl=>S.templates.find(t=>t.slug===sl)).filter(Boolean);
  modal(`
    <div class="mt">Restore ${back.length} public link${back.length===1?'':'s'}?</div>
    <div class="mb">The addresses are unchanged. Anything still embedding them — a partner site, an email, a CMS — starts working again as soon as the files are ready.</div>
    <div class="ro"><span class="k">Restoring</span><span class="v">${back.map(t=>esc(t.name)).join(', ')||'—'}</span></div>
    <div class="ro"><span class="k">Addresses</span><span class="v">Identical to before. Nothing changes on the partner's side.</span></div>
    <div class="ro"><span class="k">Rights expiry</span><span class="v">${G.ceiling?fmtDate(G.ceiling):'None — the renewed licence has no end date'}</span></div>
    <div class="field" style="margin-top:14px;">
      <div class="flab">Link expiry <span class="opt">OPTIONAL</span></div>
      <input type="date" class="inp" id="resArv" min="${todayISO()}" ${ceilingISO()?`max="${ceilingISO()}"`:''}>
    </div>
    <div class="mf">
      <button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pri" onclick="doRestore()">Restore ${back.length} link${back.length===1?'':'s'}</button>
    </div>`);
}
function doRestore(){
  const arv = document.getElementById('resArv'); if(arv && arv.value) setRevokeSilent(arv.value);
  const back = [...S.revoked];
  S.published = true; S.revoked = []; closeModal();
  beginRender(back);
  toast('Links restored \u00b7 same addresses \u00b7 preparing files');
}
function openDiscard(){
  modal(`
    <div class="mt">Discard ${S.revoked.length} link records?</div>
    <div class="mb">The addresses stay dead. Anything still embedding them keeps showing a broken image, permanently, unless someone publishes this asset again from scratch.</div>
    <div class="alert a-info">${svg(I.info,15)}<div class="at">Publishing again later would produce the same addresses anyway \u2014 they\u2019re derived from the asset and the output, not stored. Discarding only removes the prompt.</div></div>
    <div class="mf"><button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dst" onclick="S.revoked=[];closeModal();toast('Records discarded');">Discard records</button></div>`);
}
function openUnpublish(){
  const n = Object.values(S.outputs).filter(o=>o.status==='ready').length;
  modal(`
    <div class="mt">Remove all public links?</div>
    <div class="mb">${n} links will stop working. Anyone using them \u2014 a partner website, an email, a CMS \u2014 will see an error instead of the image.</div>
    <div class="ro"><span class="k">Links removed</span><span class="v">${n}</span></div>
    <div class="ro"><span class="k">Cached copies</span><span class="v">Cleared from every region</span></div>
    <div class="ro"><span class="k">Takes effect</span><span class="v">~4 min — some regions keep serving the image until then</span></div>
    <div class="field" style="margin-top:14px;">
      <div class="flab">Reason</div><input class="inp" placeholder="Recorded in the audit log">
    </div>
    <div class="mf">
      <button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dst" onclick="S.published=false;S.outputs={};closeModal();toast('${n} public links removed');">Remove links</button>
    </div>`);
}

  closeModal(); go('template'); toast('Saved to your personal templates');
}
function openCustomSize(){
  modal(`
    <div class="mt">Add a one-off size</div>
    <div class="mb">Downloads with this batch and is discarded. It does not become a template.</div>
    <div style="display:flex;gap:10px;">
      <div class="field" style="flex:1"><div class="flab">Width</div>

      <div class="field" style="flex:1"><div class="flab">Height</div>
        <input type="number" class="inp" id="ch" value="100" min="1" max="${SOURCE.h}" oninput="checkEph()"></div>
      <div class="field" style="flex:1"><div class="flab">Format</div>
        <select class="inp" id="cf"><option>JPEG</option><option>WebP</option><option>PNG</option></select></div>

    <div class="mf"><button class="btn btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn btn-pri" onclick="addEph()">Add to batch</button></div>`);

function addEph(){
  const w=+document.getElementById('cw').value||100, h=+document.getElementById('ch').value||100;
  if(w>SOURCE.w || h>SOURCE.h){ toast('Larger than the source — no upscaling'); return; }
  S.ephemeral.push({w,h,fmt:document.getElementById('cf').value});
  closeModal(); draw(); toast('Added as a one-off output');
}

function modal(html, light){ S.menu=null; modalRoot.innerHTML=`<div class="ovl" onclick="if(event.target===this)closeModal()"><div class="mdl ${light?'lt':''}">${html}</div></div>`; }
function closeModal(){ modalRoot.innerHTML=''; draw(); }
function copy(t){ try{navigator.clipboard.writeText(t.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;|\\'/g,"'"));}catch(e){} S.menu=null; draw(); toast('Copied to clipboard'); }
let tt;
function toast(m){ clearTimeout(tt); toastRoot.innerHTML=`<div class="toast">${svg(I.check,14)}${esc(m)}</div>`;
  tt=setTimeout(()=>toastRoot.innerHTML='',2200); }

document.querySelectorAll('.appnav .nav').forEach(b=>b.addEventListener('click',()=>{ S.view=b.dataset.v; S.menu=null; draw(); }));
document.addEventListener('click',e=>{ if(S.menu && !e.target.closest('.lr-a') && !e.target.closest('.menu')
  && !e.target.closest('.rel') && !e.target.closest('.lmenu')){ S.menu=null; draw(); } });

function drawRights(){
  const r = S.rights, G = gate();
  const ro = !isMgr();
  const chip = c => `<button class="chip ${r.channels.includes(c)?'on':''}" ${ro?'disabled':''} onclick="toggleChannel('${c}')">${c}</button>`;
  panel.innerHTML = `
    <div class="ph">Rights</div>
    ${ro?`<div class="alert a-info">${svg(I.lock,15)}<div class="at">Read-only. Editing rights requires the <b style="display:inline;">Rights Manager</b> role — otherwise the gate on public links would be self-serve.</div></div>`:''}
    <div class="eyebrow" style="margin-top:0;">Time-based rights</div>
    <div style="display:flex;gap:10px;min-width:0;">
      <div class="field" style="flex:1;min-width:0;"><div class="flab">Embargo <span class="opt">OPTIONAL</span></div>
        <input type="date" class="inp" value="${r.embargo}" ${ro?'disabled':''} onchange="setRight('embargo',this.value)">
        <div class="help">Unusable before this date.</div></div>
      <div class="field" style="flex:1;min-width:0;"><div class="flab">Expiry <span class="opt">OPTIONAL</span></div>
        <input type="date" class="inp" value="${r.expiry}" ${ro?'disabled':''} onchange="setRight('expiry',this.value)">
        <div class="help">Unusable after this date.</div></div>
    </div>
    <div class="eyebrow">Licensing</div>
    <div class="field"><div class="flab">Licence type</div>
      <select class="inp" ${ro?'disabled':''} onchange="setRight('type',this.value)">
        ${['Royalty-free','Rights-managed','Editorial only','Internal use only'].map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}
      </select></div>
    <div class="field"><div class="flab">Licence owner</div>
      <input class="inp" value="${esc(r.owner)}" ${ro?'disabled':''} onchange="setRight('owner',this.value)"></div>

    <div class="eyebrow">This licence permits use</div>
    <div class="field"><div class="flab">In territories</div>
      <select class="inp" ${ro?'disabled':''} onchange="setRight('territories',this.value)">
        ${['Global','UK, IE','EU','US'].map(t=>`<option ${r.territories===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <div class="help">${r.territories==='Global'?'Cleared for use in all territories.':'A public link cannot be geo-restricted — it will be blocked.'}</div></div>
    <div class="field"><div class="flab">On channels</div>
      <div class="chips" style="gap:6px;">${CHANNELS.map(chip).join('')}</div>
      <div class="help"><b style="color:var(--ed-value);font-weight:600;">Open web</b> is the one that gates public links. It means: anyone, anywhere, no sign-in.</div></div>

    <div class="alert ${G.ok?'a-open':'a-info'}" style="margin-top:6px;">${svg(G.ok?I.link:I.lock,15)}<div class="at">
      <b>${G.ok?'Public links are permitted':'Public links are blocked'}</b>${G.ok
        ? `Cleared for open web, global${G.ceiling?`, until ${fmtDate(G.ceiling)}`:', with no end date'}.`
        : G.reason}</div></div>
    <div style="text-align:center;margin-top:10px;"><button class="btn btn-ter" onclick="go('access')">Open Access ${svg('<path d="m9 18 6-6-6-6"/>',11,2.5)}</button></div>`;

  stage.innerHTML = `
    <div class="acc">${svg(I.info,13)}<span>Rights are <b>asset-level</b>. Edit them here and Access reacts immediately.</span></div>
    <div class="canvas"><div class="crop" style="width:330px;height:220px;"><span class="focal"></span></div></div>
    <div class="outs">
      <div class="outs-h">${svg(I.rights)}Why rights can't prune output-by-output</div>
      <div style="font-size:12px;color:var(--ed-label);line-height:19px;">
        There is no per-template rights model, and there shouldn't be — templates are output recipes, not permission entities.
        A public link means <b style="color:var(--ed-value);font-weight:600;">anyone, anywhere, no sign-in</b>. That is a single question about the asset, and the answer is yes or no.
        Whether the <i>master file</i> should be public is a governance call, not a rights one — an admin sets that template to download-only in Org Manager.
      </div>
    </div>`;
}
function setRight(k,v){
  const wasOK = gate().ok;
  S.rights[k]=v;
  const c = ceilingISO(); if(S.autoRevoke && c && S.autoRevoke>c) S.autoRevoke=c;
  const G = gate();
  if(!G.ok && S.published){                       // rights just closed the gate
    if(G.kind==='expired'){ S.revoked = Object.keys(S.outputs); }
    S.published=false; S.outputs={};
    toast(G.kind==='expired'?'Rights expired — links removed, records kept':'Rights now block public links — links removed');
  }
  draw();
}
function toggleChannel(c){
  const i = S.rights.channels.indexOf(c);
  i<0 ? S.rights.channels.push(c) : S.rights.channels.splice(i,1);
  setRight('channels', S.rights.channels);
}

function mgo(t){ S.mgrTab=t; S.menu=null; draw(); }
function mmenu(slug){ S.menu = S.menu==='m:'+slug ? null : 'm:'+slug; draw(); }

function drawManager(){
  const pc = publicCount(), full = pc>=CAP;
  const shared   = S.templates.filter(t=>t.scope==='shared'  && !S.retired.includes(t.slug));
  const personal = S.templates.filter(t=>t.scope==='personal'&& !S.retired.includes(t.slug));
  const retired  = S.templates.filter(t=>S.retired.includes(t.slug));

  const th = t => t.w/t.h>=1.6?'width:38px;height:22px':t.w===t.h?'width:26px;height:26px':t.w/t.h<0.8?'width:16px;height:28px':'width:34px;height:24px';
  const chan = t => t.channel==='public'
    ? `<span class="badge b-public">${svg(I.link,10)}Public</span><div class="t-sub" style="margin-top:4px;">${t.live.toLocaleString()} live links</div>`
    : t.neverPublic ? `<span class="badge b-never">Download only</span><div class="t-sub" style="margin-top:4px;">Never eligible</div>`
    : `<span class="badge b-dl">Download only</span>`;

  const row = t => `<tr>
    <td><div class="tn"><span class="tmb" style="${th(t)}"></span>
      <div><div class="t-name">${esc(t.name)}</div><div class="t-meta">Crops to focal point</div></div></div></td>
    <td><span class="t-num">${t.w} × ${t.h}</span><div class="t-sub">${t.fmt} · ${t.q}</div></td>
    <td>${chan(t)}</td>
    <td><span class="t-num">${t.uses.toLocaleString()}</span><div class="t-sub">downloads</div>
      ${t.stale?`<span class="badge b-stale" style="margin-top:4px;">Unused ${t.stale} months</span>`:''}</td>
    <td><span class="t-num">${t.ver}</span><div class="t-sub">${esc(t.by)}</div></td>
    <td style="text-align:right;"><span class="rel">
      <button class="lbtn l-gho" onclick="mmenu('${t.slug}')">⋯</button>
      ${S.menu==='m:'+t.slug?mgrMenu(t):''}
    </span></td></tr>`;

  const tbl = rows => `<table class="tbl"><thead><tr>
      <th>Template</th><th>Output</th><th>Delivery</th><th>Used · 90d</th><th>Version</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table>`;

  let body = '';
  if(S.mgrTab==='shared')        body = tbl(shared.map(row).join(''));
  else if(S.mgrTab==='personal') body = tbl(personal.map(row).join(''));
  else if(S.mgrTab==='retired')  body = retired.length ? tbl(retired.map(row).join(''))
    : `<div class="mempty">Nothing retired yet.</div>`;
  else body = S.proposals.length ? S.proposals.map(p=>`
      <div class="prop">
        <span class="pvx" style="${p.w===p.h?'width:56px;height:56px':'width:56px;height:31px'}"></span>
        <div class="pm">
          <div class="pn">${esc(p.name)}</div>
          <div class="ps2">${p.w} × ${p.h} · ${p.fmt} · ${p.q} · crops to focal point</div>
          <div class="pby">Proposed by ${esc(p.by)} · ${p.ago} · used ${p.uses} times personally</div>
          ${p.dupe?`<div class="flagline">${svg(I.warn,12)}Identical output to <b style="font-weight:700;">${esc(p.dupe)}</b> — already shared. Rejecting points the proposer at it.</div>`:''}
        </div>
        <div class="pa">
          ${p.dupe
            ? `<button class="lbtn l-ter sm" onclick="resolveProp('${p.id}','approve')">Approve anyway</button>
               <button class="lbtn l-pri sm" onclick="resolveProp('${p.id}','reject')">Reject — duplicate</button>`
            : `<button class="lbtn l-ter sm" onclick="resolveProp('${p.id}','reject')">Reject</button>
               <button class="lbtn l-sec sm" onclick="resolveProp('${p.id}','rename')">Rename &amp; approve</button>
               <button class="lbtn l-pri sm" onclick="resolveProp('${p.id}','approve')">Approve</button>`}
        </div>
      </div>`).join('') : `<div class="mempty">No proposals waiting.</div>`;

  mgr.innerHTML = `
    <div class="mh">
      <div class="crumb">Org Manager · DAM</div>
      <div class="mt2">Templates</div>
      <div class="msub">Output templates available across the library. What each one produces is defined in the asset editor; scope, delivery and retirement are managed here.</div>
      <div class="capbar ${full?'full':''}">
        <div>
          <div class="cb-t">Publicly deliverable templates</div>
          <div class="cb-s">${full
            ? 'Cap reached. To make another public, take one off first.'
            : 'Each one creates a public link on every published asset whose rights allow it.'}</div>
        </div>
        <div class="cb-m">
          <span class="pips">${Array.from({length:CAP},(_,i)=>`<i class="pip ${i<pc?'on':''}"></i>`).join('')}</span>
          <span class="cb-n">${pc} of ${CAP}</span>
        </div>
      </div>
    </div>
    <div class="mtabs">
      <button class="mtab ${S.mgrTab==='shared'?'on':''}"    onclick="mgo('shared')">Shared <span class="n">${shared.length}</span></button>
      <button class="mtab ${S.mgrTab==='proposals'?'on':''}" onclick="mgo('proposals')">Proposals <span class="n">${S.proposals.length}</span></button>
      <button class="mtab ${S.mgrTab==='personal'?'on':''}"  onclick="mgo('personal')">Personal <span class="n">${personal.length}</span></button>
      <button class="mtab ${S.mgrTab==='retired'?'on':''}"   onclick="mgo('retired')">Retired <span class="n">${retired.length}</span></button>
    </div>
    ${body}`;
}

function mgrMenu(t){
  const isRetired = S.retired.includes(t.slug);
  const CHEV = svg('<path d="m9 18 6-6-6-6"/>',10,2.5);
  return `<div class="lmenu up">
    <button class="lmi" onclick="openTplSettings('${t.slug}')">${svg(I.pen,14)}Template settings…</button>
    <button class="lmi" onclick="S.view='editor';go('adjust');toast('Opened in Adjustments')">${svg(I.adjust,14)}Edit size &amp; format<span class="tag">Adjustments ${CHEV}</span></button>
    <button class="lmi" onclick="toast('${t.uses.toLocaleString()} downloads · ${t.live.toLocaleString()} live links')">${svg(I.chart,14)}Usage &amp; live links</button>
    <button class="lmi" onclick="toast('${esc(t.ver)} · last changed by ${esc(t.by)}')">${svg(I.versions,14)}Version history</button>
    <div class="lsep"></div>
    <div class="lcap">Lifecycle</div>
    ${isRetired
      ? `<button class="lmi" onclick="S.retired=S.retired.filter(x=>x!=='${t.slug}');S.menu=null;draw();toast('Restored to the library')">${svg(I.up,14)}Restore to the library</button>`
      : `<button class="lmi" onclick="openRetire('${t.slug}')">${svg(I.archive,14)}Retire<span class="tag">confirm</span></button>`}
    <button class="lmi dst" onclick="openTplDelete('${t.slug}')">${svg(I.trash,14)}Delete<span class="tag">confirm</span></button>
  </div>`;
}

/* ---- template settings: the ONLY place the delivery channel is set ---- */
function openTplSettings(slug){
  const t = S.templates.find(x=>x.slug===slug);
  const pc = publicCount(), full = pc>=CAP && t.channel!=='public';
  const low = lowestUse();
  let ch;
  if(t.neverPublic){
    ch = `<label class="chk"><span class="box no"></span><div style="opacity:.6;"><div class="ck-t">Available as a public link</div></div></label>
      <div class="ck-no" style="margin-left:26px;">${svg(I.no,11)}This template can never be public</div>
      <div class="ck-h" style="margin-left:26px;">${esc(t.neverPublic)}</div>`;
  } else if(full){
    ch = `<label class="chk"><span class="box no"></span><div style="opacity:.6;"><div class="ck-t">Available as a public link</div></div></label>
      <div class="ck-no" style="margin-left:26px;">${svg(I.no,11)}${CAP} of ${CAP} public templates in use</div>
      <div class="ck-h" style="margin-left:26px;">Every public template multiplies across the whole published library. To add this one, take another off first — <b style="color:#261e1b;font-weight:600;">${esc(low.name)}</b> has the lowest usage at ${low.uses.toLocaleString()} downloads.</div>
      <div style="margin-left:26px;margin-top:10px;"><button class="lbtn l-sec sm" onclick="openTplSettings('${low.slug}')">Open ${esc(low.name)}</button></div>`;
  } else {
    const on = t.channel==='public';
    ch = `<label class="chk" onclick="flipChannel('${t.slug}')">
        <span class="box ${on?'on':''}">${on?svg(I.check,10,3.5):''}</span>
        <div>
          <div class="ck-t">Available as a public link</div>
          <div class="ck-h">Published assets whose rights allow public use will get a link for this output. Leave off for print, masters and working files.</div>
          ${on
            ? `<div class="ck-w">Currently serving <b>${t.live.toLocaleString()} public links</b>. Turning this off stops every one of them, breaking anything that embeds them. You'll be asked for a reason.</div>`
            : `<div class="ck-w">Turning this on would create <b>${(41006).toLocaleString()} public links</b> across the published library — one per asset whose rights allow it.</div>`}
        </div></label>`;
  }
  modal(`
    <div class="mt">Template settings</div>
    <div class="mb">${esc(t.name)} · ${t.scope} · ${t.ver}</div>
    <div class="ro"><span class="k">Output</span><span class="v">${t.w} × ${t.h} · ${t.fmt} · ${t.q}</span></div>
    <div class="ro"><span class="k">Crop</span><span class="v">To focal point</span></div>
    <div class="ro"><span class="k">Used</span><span class="v">${t.uses.toLocaleString()} downloads · last 90 days</span></div>
    <div class="field" style="margin-top:14px;"><div class="flab">Name</div><input class="inp" value="${esc(t.name)}"></div>
    <div class="eyebrow">Delivery</div>
    ${ch}
    <div class="mf">
      <button class="lbtn l-ter" onclick="openRetire('${t.slug}')">Retire</button>
      <button class="lbtn l-sec" onclick="closeModal()">Cancel</button>
      <button class="lbtn l-pri" onclick="closeModal();toast('Saved')">Save</button>
    </div>`, true);
}

/* ---- the blast-radius confirm ---- */
function flipChannel(slug){
  const t = S.templates.find(x=>x.slug===slug);
  if(t.channel==='public'){
    modal(`
      <div class="mt">Stop delivering ${esc(t.name)} publicly?</div>
      <div class="mb"><b style="color:#261e1b;font-weight:600;">${t.live.toLocaleString()} public links</b> will stop working across the whole library. Every partner site, email and CMS using one of them will show a broken image.</div>
      <div class="ro"><span class="k">Links stopped</span><span class="v">${t.live.toLocaleString()}</span></div>
      <div class="ro"><span class="k">Assets affected</span><span class="v">${t.live.toLocaleString()} published assets</span></div>
      <div class="ro"><span class="k">Cached copies</span><span class="v">Cleared from every region</span></div>
      <div class="ro"><span class="k">Takes effect</span><span class="v">~4 min — some regions keep serving until then</span></div>
      <div class="ro"><span class="k">Reversible</span><span class="v">Yes — turning it back on restores the identical addresses</span></div>
      <div class="field" style="margin-top:14px;"><div class="flab">Reason</div>
        <input class="inp" placeholder="Recorded in the audit log"></div>
      <div class="mf">
        <button class="lbtn l-sec" onclick="openTplSettings('${slug}')">Cancel</button>
        <button class="lbtn l-dst" onclick="doFlip('${slug}','download')">Stop ${t.live.toLocaleString()} links</button>
      </div>`, true);
  } else {
    modal(`
      <div class="mt">Make ${esc(t.name)} publicly deliverable?</div>
      <div class="mb">This template will become a public link on every published asset whose rights allow public use.</div>
      <div class="ro"><span class="k">New public links</span><span class="v">41,006 across the published library</span></div>
      <div class="ro"><span class="k">Not included</span><span class="v">Assets not cleared for open web, outside global territory, or expired</span></div>
      <div class="ro"><span class="k">Cap</span><span class="v">${publicCount()+1} of ${CAP} public templates after this</span></div>
      <div class="ro"><span class="k">Reversible</span><span class="v">Yes — but turning it off stops all 41,006</span></div>
      <div class="mf">
        <button class="lbtn l-sec" onclick="openTplSettings('${slug}')">Cancel</button>
        <button class="lbtn l-pri" onclick="doFlip('${slug}','public')">Create 41,006 links</button>
      </div>`, true);
  }
}
function doFlip(slug, ch){
  const t = S.templates.find(x=>x.slug===slug);
  t.channel = ch; t.live = ch==='public' ? 41006 : 0;
  if(ch==='download'){ delete S.outputs[slug]; }
  closeModal();
  toast(ch==='public' ? `${t.name} is now a public link on every eligible asset` : `${t.name} links stopped everywhere`);
}

/* ---- retire vs delete ---- */
function openRetire(slug){
  const t = S.templates.find(x=>x.slug===slug);
  modal(`
    <div class="mt">Retire "${esc(t.name)}"?</div>
    <div class="mb">It leaves the template pickers and stops appearing on new assets.${t.live?` Its <b style="color:#261e1b;font-weight:600;">${t.live.toLocaleString()} existing public links keep working</b> — retiring doesn't break anything.`:''}</div>
    <div class="ro"><span class="k">Pickers</span><span class="v">Hidden</span></div>
    <div class="ro"><span class="k">Existing links</span><span class="v">${t.live?`${t.live.toLocaleString()} keep working`:'None'}</span></div>
    <div class="ro"><span class="k">Reversible</span><span class="v">Yes — restore it from the Retired tab</span></div>
    <div class="mf">
      <button class="lbtn l-sec" onclick="closeModal()">Cancel</button>
      <button class="lbtn l-pri" onclick="S.retired.push('${slug}');closeModal();toast('Retired — existing links keep working');">Retire</button>
    </div>`, true);
}
function openTplDelete(slug){
  const t = S.templates.find(x=>x.slug===slug);
  if(t.live>0){
    modal(`
      <div class="mt">Delete "${esc(t.name)}"?</div>
      <div class="ck-no" style="margin:6px 0 10px;">${svg(I.lock,11)}Can't delete — ${t.live.toLocaleString()} live public links</div>
      <div class="ck-h" style="margin-bottom:14px;">Deleting this template would permanently break every link derived from it. The addresses are generated from the template, so once it's gone they can never be restored.</div>
      <div class="ro"><span class="k">Retire</span><span class="v">Hidden from pickers · links keep working</span></div>
      <div class="ro"><span class="k">Stop and delete</span><span class="v">Stops ${t.live.toLocaleString()} links · permanent</span></div>
      <div class="mf">
        <button class="lbtn l-dst" onclick="doFlip('${slug}','download');S.retired.push('${slug}');toast('Links stopped and template deleted');">Stop and delete</button>
        <button class="lbtn l-pri" onclick="S.retired.push('${slug}');closeModal();toast('Retired instead — links keep working');">Retire instead</button>
      </div>`, true);
  } else {
    modal(`
      <div class="mt">Delete "${esc(t.name)}"?</div>
      <div class="mb">No public links use this template, so nothing breaks. It disappears from every picker.</div>
      <div class="mf">
        <button class="lbtn l-sec" onclick="closeModal()">Cancel</button>
        <button class="lbtn l-dst" onclick="S.templates=S.templates.filter(x=>x.slug!=='${slug}');closeModal();toast('Deleted');">Delete</button>
      </div>`, true);
  }
}
function resolveProp(id, how){
  const p = S.proposals.find(x=>x.id===id);
  S.proposals = S.proposals.filter(x=>x.id!==id);
  if(how==='reject'){ toast(p.dupe?`Rejected — proposer pointed at ${p.dupe}`:'Rejected'); }
  else {
    S.templates.push({slug:'sh'+Date.now(), name:p.name, w:p.w, h:p.h, fmt:p.fmt==='JPEG'?'JPG':p.fmt, q:p.q,
      channel:'download', scope:'shared', size:'—', uses:0, live:0, ver:'v1', by:p.by});
    toast(how==='rename'?'Renamed and added to the shared library':'Added to the shared library');
  }
  S.menu=null; draw();
}

function draw(){
  editorView.style.display = S.view==='editor' ? '' : 'none';
  mgrView.style.display    = S.view==='manager' ? '' : 'none';
  document.querySelectorAll('.appnav .nav').forEach(b=>b.classList.toggle('on', b.dataset.v===S.view));
  if(S.view==='manager'){ drawManager();
    segRights.innerHTML = Object.entries(PRESETS).map(([k,v])=>`<option value="${k}" ${S.preset===k?'selected':''}>${v.label}</option>`).join('');
    document.querySelectorAll('#segRole button').forEach(b=>b.classList.toggle('on',b.dataset.v===S.role));
    swFail.classList.toggle('on',S.simFail);
    return; }
  renderRail();
  if(S.tab==='adjust') drawAdjust();
  else if(S.tab==='template') drawTemplate();
  else if(S.tab==='rights') drawRights();
  else drawAccess();
  segRights.innerHTML = Object.entries(PRESETS).map(([k,v])=>`<option value="${k}" ${S.preset===k?'selected':''}>${v.label}</option>`).join('');
  document.querySelectorAll('#segRole button').forEach(b=>b.classList.toggle('on',b.dataset.v===S.role));
  swFail.classList.toggle('on',S.simFail);
}
segRights.addEventListener('change',e=>{
  const k = e.target.value; S.preset = k;
  const wasPub = S.published;
  S.rights = {...PRESETS[k], channels:[...PRESETS[k].channels]};
  const G = gate();
  if(k==='expired'){
    S.revoked = S.templates.filter(t=>t.channel==='public' && sizeValid(t)).map(t=>t.slug);
    S.published=false; S.outputs={};
  } else if(S.revoked.length && G.ok){
    S.published=false; S.outputs={};              // hold the records → restore prompt
  } else {
    S.revoked=[];
    if(wasPub && G.ok) beginRender(eligible().map(t=>t.slug)); else { S.published=false; S.outputs={}; }
  }
  const c = ceilingISO(); if(S.autoRevoke && c && S.autoRevoke>c) S.autoRevoke=c;
  S.tab='access'; draw();
});
segRole.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return; S.role=b.dataset.v; S.menu=null; draw(); });
swFail.addEventListener('click',()=>{ S.simFail=!S.simFail; draw(); });
btnReset.addEventListener('click',()=>{ reset(); draw(); toast('Reset'); });

draw();
</script>
</body>
</html>
